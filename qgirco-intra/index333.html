<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Coming soon page" />
  <title>Coming Soon</title>
  <style>
    :root{
      --bg1:#0b1020;
      --bg2:#121a36;
      --card:#0f1733cc;
      --text:#e9ecf5;
      --muted:#a9b0c7;
      --accent:#6ea8ff;
      --accent2:#9b7bff;
      --ring: rgba(110,168,255,.35);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 15% 15%, rgba(155,123,255,.22), transparent 60%),
        radial-gradient(900px 600px at 85% 30%, rgba(110,168,255,.18), transparent 60%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .wrap{
      width:min(980px, 100%);
      display:grid;
      gap:22px;
      align-items:stretch;
      text-align: center;
    }

    @media (max-width: 860px){
      .wrap{ grid-template-columns: 1fr; }
    }

    .card{
      background: var(--card);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 28px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      position:relative;
      overflow:hidden;
    }

    .card:before{
      content:"";
      position:absolute;
      inset:-2px;
      background: linear-gradient(120deg, rgba(110,168,255,.25), rgba(155,123,255,.18), transparent 65%);
      filter: blur(18px);
      opacity:.55;
      pointer-events:none;
    }

    .card > *{ position:relative; }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-size: 13px;
      letter-spacing:.2px;
      margin-bottom: 18px;
    }
    .dot{
      width:10px;height:10px;border-radius:99px;
      background: radial-gradient(circle at 30% 30%, #fff, var(--accent));
      box-shadow: 0 0 0 6px rgba(110,168,255,.12);
    }

    h1{
      margin: 0 0 10px;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.03;
      letter-spacing: -0.02em;
    }

    
    /* subtle animated glow */
    .glow{
      position:absolute;
      right:-120px;
      top:-120px;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle at 30% 30%, rgba(110,168,255,.35), transparent 60%);
      filter: blur(2px);
      animation: float 6s ease-in-out infinite;
      pointer-events:none;
      opacity:.7;
    }
    @keyframes float{
      0%,100%{ transform: translate(0,0); }
      50%{ transform: translate(-18px, 18px); }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="glow"></div>
      <div class="badge">
        <span class="dot"></span>
        <span>We’re building something new</span>
      </div>

      <h1>Coming Soon.</h1>
      
    </section>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
